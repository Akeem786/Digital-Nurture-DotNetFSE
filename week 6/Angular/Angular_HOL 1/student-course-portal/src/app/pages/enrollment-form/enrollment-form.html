<div>
  <h2>Student Enrollment Form</h2>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">
    
    <div>
      <label>Student Name:</label>
      <input type="text" name="studentName" 
             [(ngModel)]="studentName" 
             #nameCtrl="ngModel"
             required minlength="3" />
      <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']" style="color:red">
        Name is required
      </span>
      <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']" style="color:red">
        Name must be at least 3 characters
      </span>
    </div>
    <br/>

    <div>
      <label>Email:</label>
      <input type="email" name="studentEmail"
             [(ngModel)]="studentEmail"
             #emailCtrl="ngModel"
             required email />
      <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']" style="color:red">
        Email is required
      </span>
      <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']" style="color:red">
        Enter a valid email
      </span>
    </div>
    <br/>

    <div>
      <label>Course ID:</label>
      <input type="number" name="courseId"
             [(ngModel)]="courseId"
             #courseCtrl="ngModel"
             required />
      <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']" style="color:red">
        Course ID is required
      </span>
    </div>
    <br/>

    <div>
      <label>Preferred Semester:</label>
      <select name="preferredSemester" [(ngModel)]="preferredSemester" required>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>
    <br/>

    <div>
      <label>
        <input type="checkbox" name="agreeToTerms" [(ngModel)]="agreeToTerms" required />
        I agree to the terms and conditions
      </label>
    </div>
    <br/>

    <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
    <button type="button" (click)="enrollForm.resetForm()">Reset</button>
  </form>

  <div *ngIf="submitted" style="color:green; margin-top:10px;">
    ✅ Enrollment request submitted successfully!
  </div>
</div>
