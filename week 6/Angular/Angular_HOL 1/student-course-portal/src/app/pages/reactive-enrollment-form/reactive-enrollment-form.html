<div>
  <h2>Reactive Enrollment Form</h2>

  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

    <div>
      <label>Student Name:</label>
      <input type="text" formControlName="studentName" />
      <span *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['required']" style="color:red">
        Name is required
      </span>
      <span *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['minlength']" style="color:red">
        Name must be at least 3 characters
      </span>
    </div>
    <br/>

    <div>
      <label>Email:</label>
      <input type="email" formControlName="studentEmail" />
      <span *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['required']" style="color:red">
        Email is required
      </span>
      <span *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['email']" style="color:red">
        Enter a valid email
      </span>
      <span *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']" style="color:red">
        Email already taken
      </span>
    </div>
    <br/>

    <div>
      <label>Course ID:</label>
      <input type="text" formControlName="courseId" />
      <span *ngIf="enrollForm.get('courseId')?.touched && enrollForm.get('courseId')?.errors?.['required']" style="color:red">
        Course ID is required
      </span>
      <span *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']" style="color:red">
        Course code starting with XX is not allowed
      </span>
    </div>
    <br/>

    <div>
      <label>Preferred Semester:</label>
      <select formControlName="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>
    <br/>

    <div>
      <label>
        <input type="checkbox" formControlName="agreeToTerms" />
        I agree to the terms and conditions
      </label>
    </div>
    <br/>

    <h3>Additional Courses</h3>
    <div formArrayName="additionalCourses">
      <div *ngFor="let ctrl of additionalCourses.controls; let i=index">
        <input [formControlName]="i" placeholder="Course code" />
        <button type="button" (click)="removeCourse(i)">Remove</button>
      </div>
    </div>
    <button type="button" (click)="addCourse()">+ Add Another Course</button>
    <br/><br/>

    <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
    <button type="button" (click)="enrollForm.reset()">Reset</button>
  </form>

  <div *ngIf="submitted" style="color:green; margin-top:10px;">
    ✅ Reactive Enrollment submitted successfully!
  </div>
</div>
